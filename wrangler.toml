name = "deezer-proxy"
main = "src/index.ts"
compatibility_date = "2025-11-05"

routes = [
    { pattern = "deezer.music-stream-match.space", zone_name = "music-stream-match.space", custom_domain = true }
]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# Custom domain configuration
# After deploying, add custom domain in Cloudflare Dashboard:
# Workers & Pages > deezer-proxy > Settings > Triggers > Custom Domains
# Add: deezer.music-stream-match.space

[vars]
ALLOWED_ORIGIN = "https://localhost-vite.mobulum.xyz"

# For local development
[env.development]
vars = { ALLOWED_ORIGIN = "https://localhost-vite.mobulum.xyz" }
